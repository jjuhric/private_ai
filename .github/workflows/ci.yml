name: CI Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CFLAGS: "-Wno-error"
  CXXFLAGS: "-Wno-error"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install Project Dependencies
        run: npm run install:all
      - name: Run Backend Unit & Integration Tests
        run: npm run coverage:backend

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install Project Dependencies
        run: npm run install:all
      - name: Build Frontend Application
        run: npm run build
      - name: Run Frontend Component Tests
        run: npm run coverage:frontend

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install Project Dependencies
        run: npm run install:all
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Build Frontend Application
        run: npm run build
      - name: Run Playwright E2E Tests
        run: npm run test:e2e

  deploy:
    needs: [backend-tests, frontend-tests, e2e-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
      - name: Trigger Pi Auto-Update Webhook
        run: |
          if [ -z "${{ secrets.PI_WEBHOOK_URL }}" ]; then
            echo "PI_WEBHOOK_URL secret is not configured. Skipping webhook trigger."
            exit 0
          fi
          PAYLOAD='{"ref":"${{ github.sha }}"}'
          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.UPDATE_WEBHOOK_SECRET }}" | awk '{print "sha256="$2}')
          curl -X POST "${{ secrets.PI_WEBHOOK_URL }}/api/update" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD"
