<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private AI Node Dashboard & Explorer</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding: 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-main);
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgb(16, 185, 129);
      color: rgb(34, 197, 94);
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .explorer-container {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .breadcrumb span {
      cursor: pointer;
      color: var(--primary);
      transition: color 0.15s ease;
    }

    .breadcrumb span:hover {
      color: var(--primary-hover);
      text-decoration: underline;
    }

    .breadcrumb-separator {
      color: var(--text-muted);
      user-select: none;
    }

    .breadcrumb .active-node {
      color: var(--text-main);
      cursor: default;
      text-decoration: none;
    }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 1.25rem;
      overflow-y: auto;
      align-content: start;
    }

    .item-card {
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .item-card:hover {
      transform: translateY(-2px);
      background: rgba(15, 23, 42, 0.7);
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
    }

    .icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .item-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-main);
      word-break: break-all;
      line-height: 1.2;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      margin: auto;
      font-size: 1.1rem;
    }

    /* PDF Modal Preview Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 2rem;
    }

    .pdf-viewer {
      background: #f1f5f9;
      width: 100%;
      max-width: 850px;
      height: 90vh;
      border-radius: 8px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #cbd5e1;
    }

    .pdf-toolbar {
      background: #475569;
      color: #f8fafc;
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
    }

    .pdf-title {
      font-size: 0.95rem;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 400px;
    }

    .pdf-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.85rem;
      color: #e2e8f0;
    }

    .pdf-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }

    .pdf-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .pdf-btn.close-btn {
      background: #ef4444;
      border: none;
    }

    .pdf-btn.close-btn:hover {
      background: #dc2626;
    }

    .pdf-body-scroll {
      flex-grow: 1;
      overflow-y: auto;
      padding: 2.5rem;
      display: flex;
      justify-content: center;
      background: #64748b;
    }

    .pdf-page {
      background: #ffffff;
      color: #1e293b;
      width: 100%;
      max-width: 700px;
      min-height: 842px; /* A4 aspect ratio */
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
      padding: 3rem;
      font-family: Georgia, Cambria, "Times New Roman", Times, serif;
      font-size: 0.95rem;
      line-height: 1.6;
      border-radius: 2px;
      position: relative;
    }

    .pdf-header {
      border-bottom: 2px solid #0f172a;
      padding-bottom: 0.75rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
    }

    .pdf-content {
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 2rem;
    }

    .pdf-footer {
      position: absolute;
      bottom: 2rem;
      left: 3rem;
      right: 3rem;
      border-top: 1px solid #e2e8f0;
      padding-top: 0.75rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Private AI Client Explorer</h1>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem;">Telemetry Node & Logs Viewer</p>
    </div>
    <span class="status-badge">Node Online</span>
  </header>

  <div class="explorer-container">
    <div class="breadcrumb" id="breadcrumb">
      <span onclick="navigateTo('')">Root</span>
    </div>

    <div class="file-grid" id="file-grid">
      <!-- Loaded dynamically -->
    </div>
    
    <div class="empty-state" id="empty-state" style="display: none;">
      No folders or text files found in this directory.
    </div>
  </div>

  <!-- PDF Modal Overlay -->
  <div class="modal-overlay" id="pdf-modal">
    <div class="pdf-viewer">
      <div class="pdf-toolbar">
        <div class="pdf-title" id="modal-title">report.pdf</div>
        <div class="pdf-controls">
          <span>Page 1 of 1</span>
          <button class="pdf-btn" onclick="window.print()">Print</button>
          <button class="pdf-btn close-btn" onclick="closeModal()">Close</button>
        </div>
      </div>
      <div class="pdf-body-scroll">
        <div class="pdf-page">
          <div class="pdf-header">
            <span>Private AI Archive System</span>
            <span id="pdf-date">July 2026</span>
          </div>
          <div class="pdf-content" id="modal-content">
            <!-- Content loaded dynamically -->
          </div>
          <div class="pdf-footer">
            <span>Classification: Restricted</span>
            <span>Page 1</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentPath = '';

    async function loadDirectory(path) {
      currentPath = path;
      updateBreadcrumb(path);

      try {
        const res = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
        const data = await res.json();
        
        const grid = document.getElementById('file-grid');
        const emptyState = document.getElementById('empty-state');
        grid.innerHTML = '';

        if (data.success && data.files.length > 0) {
          emptyState.style.display = 'none';
          grid.style.display = 'grid';

          data.files.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.onclick = () => {
              if (item.isDirectory) {
                loadDirectory(item.path);
              } else {
                previewFile(item.path, item.name);
              }
            };

            const icon = document.createElement('div');
            icon.className = 'icon';
            icon.textContent = item.isDirectory ? '📁' : '📄';

            const name = document.createElement('div');
            name.className = 'item-name';
            name.textContent = item.name;

            card.appendChild(icon);
            card.appendChild(name);
            grid.appendChild(card);
          });
        } else {
          grid.style.display = 'none';
          emptyState.style.display = 'block';
        }
      } catch (err) {
        console.error('Failed to load directory:', err);
      }
    }

    function updateBreadcrumb(path) {
      const breadcrumb = document.getElementById('breadcrumb');
      breadcrumb.innerHTML = '<span onclick="loadDirectory(\'\')">Root</span>';

      if (!path) return;

      const parts = path.split('/');
      let accumulated = '';
      
      parts.forEach((part, index) => {
        accumulated += (accumulated ? '/' : '') + part;
        breadcrumb.appendChild(createSeparator());
        
        const span = document.createElement('span');
        span.textContent = part;
        if (index === parts.length - 1) {
          span.className = 'active-node';
        } else {
          const target = accumulated;
          span.onclick = () => loadDirectory(target);
        }
        breadcrumb.appendChild(span);
      });
    }

    function createSeparator() {
      const sep = document.createElement('span');
      sep.className = 'breadcrumb-separator';
      sep.textContent = '/';
      return sep;
    }

    async function previewFile(filePath, fileName) {
      try {
        const res = await fetch(`/api/files/content?path=${encodeURIComponent(filePath)}`);
        const data = await res.json();

        if (data.success) {
          document.getElementById('modal-title').textContent = fileName;
          
          // Formatted date header
          const parts = filePath.split('/');
          if (parts.length >= 3) {
            document.getElementById('pdf-date').textContent = `${parts[0]}-${parts[1]}-${parts[2]}`;
          } else {
            document.getElementById('pdf-date').textContent = 'Node Archive';
          }

          document.getElementById('modal-content').textContent = data.content;
          document.getElementById('pdf-modal').style.display = 'flex';
        }
      } catch (err) {
        console.error('Failed to load file contents:', err);
      }
    }

    function closeModal() {
      document.getElementById('pdf-modal').style.display = 'none';
    }

    function navigateTo(path) {
      loadDirectory(path);
    }

    // Initial load
    loadDirectory('');
  </script>
</body>
</html>
